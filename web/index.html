<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Properties Map</title>
    <link rel="stylesheet" type="text/css" href="./style.css" />
    <script src="./properties_data.js"></script>
</head>

<body>
    <div id="container">
        <div id="sidebar">
            <div id="filters">
                <h2>Properties List</h2>
                <form id="filter-form" method="GET" action="index.html">
                    <label>School Max (secs): <br /><input type="number" id="school_max" name="school_max" value="1500"
                            style="width: 70px;" /> <span id="school_max_text" style="color:#555;font-size:0.85em;"></span></label><br />
                    <label>Office Max (secs): <br /><input type="number" id="office_max" name="office_max" value="4100"
                            style="width: 70px;" /> <span id="office_max_text" style="color:#555;font-size:0.85em;"></span></label><br />
                    <label>Price Max (£): <br /><input type="number" id="price_max" name="price_max" value="1500000"
                            style="width: 100px;" /></label><br />
                    <button type="submit" style="margin-top:10px;">Filter</button>
                </form>
                <div id="result-count"></div>
            </div>
            <div id="property-list">
                <!-- List items will be injected here -->
            </div>
        </div>
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

</body>

</html>
